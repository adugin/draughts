[tool.ruff]
target-version = "py312"
line-length = 120
src = ["draughts", "tests"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort (import sorting)
    "N",      # pep8-naming
    "UP",     # pyupgrade (modern Python syntax)
    "B",      # flake8-bugbear (common bugs)
    "S",      # flake8-bandit (security)
    "A",      # flake8-builtins (shadowing builtins)
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific rules
]
ignore = [
    "S311",   # random — не криптография, а ИИ шашек
    "S101",   # assert в тестах — это нормально
    "E501",   # длина строки — контролируется formatter
    "N802",   # paintEvent, closeEvent и т.д. — имена из PyQt6, нельзя менять
    "RUF001", # кириллица в строках — русскоязычный проект
    "RUF002", # кириллица/тире в docstring — русскоязычный проект
    "RUF003", # кириллица/тире/× в комментариях — русскоязычный проект
    "S110",   # try-except-pass — осознанный выбор (звук, cleanup)
    "SIM105", # contextlib.suppress — менее читаемо для этого проекта
    "SIM108", # ternary operator — иногда if-else читабельнее
    "SIM103", # return condition — иногда явный if понятнее
    "E402",   # импорты после кода — необходимо для conditional imports
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S108", "RUF059", "E702", "F841"]  # тесты — особые правила
"draughts/tools/**/*.py" = ["F841"]  # dev tools: локальные переменные могут быть placeholders

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.pytest.ini_options]
markers = [
    "tactics: tactical regression suite (can be skipped with -m 'not tactics')",
    "slow: slow tests that should be skipped in normal CI (can be run with -m slow)",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false       # global default is lenient

[[tool.mypy.overrides]]
module = [
    "draughts.game.ai.*",
    "draughts.game.board",
    "draughts.game.analysis",
    "draughts.game.headless",
    "draughts.game.fen",
    "draughts.game.pdn",
    "draughts.game.save",
    "draughts.game.puzzles",
    "draughts.game.puzzle_miner",
    "draughts.engine.*",
]
disallow_untyped_defs = true
warn_unreachable = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = ["numpy.*", "PyQt6.*"]
ignore_missing_imports = true
